name: ML Test & Validation Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit & data-validation tests
        run: pytest tests/unit tests/data -v

      - name: Run model quality gates & regression tests
        run: pytest tests/model -v

      - name: Train model & write metrics
        run: python -m src.train

      - name: Show metrics in the run log
        run: cat metrics/metrics.json